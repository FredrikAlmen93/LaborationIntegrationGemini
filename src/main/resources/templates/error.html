<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #d9534f;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            margin-bottom: 20px;
        }

        .error-box {
            background: #fff3f3;
            border: 1px solid #f5c2c2;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #a94442;
        }

        a {
            display: inline-block;
            padding: 10px 16px;
            background: #4a6cf7;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        a:hover {
            background: #3a57d0;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Oops! Something went wrong</h1>

    <p>Something unexpected happened in the application.</p>

    <div class="error-box">
        <span th:text="${errorMessage}">Error message appears here</span>
    </div>

    <a href="/">← Back to home</a>

</div>

</body>
</html>
